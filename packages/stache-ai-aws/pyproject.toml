[build-system]
requires = ["setuptools>=61.0,<70.0"]
build-backend = "setuptools.build_meta"

[project]
name = "stache-ai-aws"
version = "0.2.2"
readme = "README.md"
description = "AWS providers bundle for Stache AI (includes S3 Vectors, DynamoDB, and Bedrock)"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Stache Contributors"}
]
keywords = ["stache", "rag", "ai", "aws", "bedrock", "dynamodb", "s3vectors"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "stache-ai>=0.3.0,<1.0.0",
    "stache-ai-s3vectors>=0.2.1",
    "stache-ai-dynamodb>=0.2.1",
    "stache-ai-bedrock>=0.2.0",
    "boto3>=1.34.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "moto>=5.0.0",
]

[project.entry-points."stache.ingest_blob"]
s3 = "stache_ai_aws.blob:S3BlobStore"

[project.entry-points."stache.ingest_queue"]
sqs = "stache_ai_aws.queue:SqsQueue"

[project.entry-points."stache.ingest_intake"]
s3presign = "stache_ai_aws.intake:S3PresignIntake"

[project.urls]
Homepage = "https://github.com/stache-ai/stache-ai"
Repository = "https://github.com/stache-ai/stache-ai"

[tool.setuptools.packages.find]
where = ["src"]
include = ["stache_ai_aws*"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
